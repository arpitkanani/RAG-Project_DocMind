embedding:
  model: "nomic-embed-text"

llm:
  model: "llama3.2:3b"
  temperature: 0.3   

# splitting chunks of text for embedding and retrieval
splitter:
  breakpoint_threshold_type: "percentile"
  breakpoint_threshold_amount: 80  

# retriver use MMR for divers answer
retriever:
  search_type: "mmr"      # mmr = diverse + relevant results
  k: 5                    # return top 3 chunks
  fetch_k: 15            # fetch 10 candidates, pick best 3
  lambda_mult: 0.5        # 0.5 = balanced relevance + diversity
  score_threshold: 0.1     # only consider chunks with score > 0.1

#vectore database used chroma
vectorstore:
  persist_directory: "data/vectorstore"   # saved here on disk
  collection_name: "docmind"              # name of collection

memory:
  persist_directory: "data/memory"          # saved here on disk
  window_days: 7                          # how many past interactions to remember

upload:
  allowed_extensions:
    - ".pdf"
    - ".txt"
    - ".docx"
    - ".csv"
    - ".md"
    - ".xlsx"
  upload_dir: "data/uploads"
  max_file_size_mb: 20      
  max_files_count: 5  

youtube:
  language: ["en","hi","gu"]   # language for YouTube video transcription
  max_chars: 70000

# add these new sections
quiz:
  default_easy: 5
  default_medium: 3
  default_hard: 2
  max_questions: 10

intent:
  summary_keywords:
    - "summarize"
    - "summary"
    - "overview"
    - "brief"
    - "tldr"
    - "condense"
    - "what is this document"
    - "what is this file"
    - "what is this document about"
    - "what does this contain"
    - "describe this document"
  quiz_keywords:
    - "quiz"
    - "questions"
    - "generate questions"
    - "test me"
    - "make questions"
    - "create questions"
  detail_keywords:
    - "detailed"
    - "structured"
    - "in depth"
    - "elaborate"
    - "comprehensive"
  summary:
  default_type: "bullets"
  show_on_upload: true
  max_chunk_size_for_direct: 10